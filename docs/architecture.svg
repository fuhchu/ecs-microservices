<svg viewBox="0 0 1200 780" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <title>ECS Microservices Architecture on AWS</title>
  <desc>Three FastAPI services on ECS Fargate behind an ALB, with RDS in private subnets, plus Cloud Map, Secrets Manager and ECR.</desc>
  <rect x="0" y="0" width="1200" height="780" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowDot" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C2761A"/>
    </marker>
  </defs>
  <text x="40" y="48" font-size="28" font-weight="700" fill="#0F172A">ECS Microservices on AWS Fargate</text>
  <text x="40" y="76" font-size="15" fill="#64748B">3 services · RDS PostgreSQL · Secrets Manager · Cloud Map · Terraform modules · OIDC CI/CD</text>
  <rect x="495" y="100" width="210" height="50" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="131" font-size="15" font-weight="600" fill="#1E293B" text-anchor="middle">Internet / Client</text>
  <line x1="600" y1="150" x2="600" y2="186" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="612" y="173" font-size="12" fill="#64748B">HTTP :80</text>
  <rect x="40" y="195" width="820" height="555" rx="14" fill="#FBFCFE" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="60" y="222" font-size="14" font-weight="700" fill="#475569">VPC  ·  10.0.0.0/16  ·  2 Availability Zones</text>
  <rect x="64" y="238" width="772" height="110" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="80" y="260" font-size="12.5" font-weight="600" fill="#64748B">PUBLIC SUBNETS</text>
  <rect x="150" y="272" width="220" height="60" rx="8" fill="#EEF4FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="260" y="298" font-size="15" font-weight="600" fill="#1E3A8A" text-anchor="middle">Application Load Balancer</text>
  <text x="260" y="318" font-size="12" fill="#3B5BA5" text-anchor="middle">public entry · HTTPS-ready</text>
  <rect x="560" y="272" width="200" height="60" rx="8" fill="#F1F5F9" stroke="#475569" stroke-width="1.4"/>
  <text x="660" y="298" font-size="15" font-weight="600" fill="#1E293B" text-anchor="middle">NAT Gateway</text>
  <text x="660" y="318" font-size="12" fill="#64748B" text-anchor="middle">egress for private tasks</text>
  <rect x="64" y="362" width="772" height="372" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="80" y="384" font-size="12.5" font-weight="600" fill="#64748B">PRIVATE SUBNETS</text>
  <rect x="350" y="398" width="220" height="58" rx="8" fill="#EEF4FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="460" y="423" font-size="15" font-weight="600" fill="#1E3A8A" text-anchor="middle">api-gateway</text>
  <text x="460" y="442" font-size="12" fill="#3B5BA5" text-anchor="middle">reverse proxy (Fargate)</text>
  <rect x="150" y="516" width="200" height="58" rx="8" fill="#EEF4FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="250" y="541" font-size="15" font-weight="600" fill="#1E3A8A" text-anchor="middle">users</text>
  <text x="250" y="560" font-size="12" fill="#3B5BA5" text-anchor="middle">CRUD (Fargate)</text>
  <rect x="570" y="516" width="200" height="58" rx="8" fill="#EEF4FF" stroke="#2563EB" stroke-width="1.6"/>
  <text x="670" y="541" font-size="15" font-weight="600" fill="#1E3A8A" text-anchor="middle">items</text>
  <text x="670" y="560" font-size="12" fill="#3B5BA5" text-anchor="middle">CRUD (Fargate)</text>
  <rect x="350" y="640" width="220" height="66" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="460" y="668" font-size="15" font-weight="600" fill="#065F46" text-anchor="middle">RDS PostgreSQL</text>
  <text x="460" y="688" font-size="12" fill="#047857" text-anchor="middle">private · encrypted at rest</text>
  <line x1="260" y1="332" x2="260" y2="375" stroke="#334155" stroke-width="2"/>
  <line x1="260" y1="375" x2="448" y2="375" stroke="#334155" stroke-width="2"/>
  <line x1="448" y1="375" x2="448" y2="396" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="456" x2="290" y2="514" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="456" x2="630" y2="514" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="545" x2="352" y2="545" stroke="#334155" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="460" y="538" font-size="11" fill="#64748B" text-anchor="middle">validate user</text>
  <line x1="270" y1="574" x2="395" y2="638" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="650" y1="574" x2="525" y2="638" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="900" y="222" font-size="14" font-weight="700" fill="#C2761A">AWS MANAGED SERVICES</text>
  <rect x="900" y="240" width="260" height="62" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1030" y="266" font-size="14.5" font-weight="600" fill="#9A3412" text-anchor="middle">Cloud Map</text>
  <text x="1030" y="285" font-size="11.5" fill="#C2761A" text-anchor="middle">private DNS service discovery</text>
  <rect x="900" y="320" width="260" height="62" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1030" y="346" font-size="14.5" font-weight="600" fill="#9A3412" text-anchor="middle">Secrets Manager</text>
  <text x="1030" y="365" font-size="11.5" fill="#C2761A" text-anchor="middle">DB creds injected at runtime</text>
  <rect x="900" y="400" width="260" height="62" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1030" y="426" font-size="14.5" font-weight="600" fill="#9A3412" text-anchor="middle">ECR</text>
  <text x="1030" y="445" font-size="11.5" fill="#C2761A" text-anchor="middle">SHA-tagged images · scan on push</text>
  <rect x="900" y="480" width="260" height="62" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="1030" y="506" font-size="14.5" font-weight="600" fill="#9A3412" text-anchor="middle">CloudWatch</text>
  <text x="1030" y="525" font-size="11.5" fill="#C2761A" text-anchor="middle">logs · Container Insights</text>
  <line x1="770" y1="427" x2="898" y2="431" stroke="#C2761A" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrowDot)"/>
  <line x1="570" y1="351" x2="898" y2="270" stroke="#C2761A" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrowDot)"/>
  <line x1="572" y1="555" x2="898" y2="358" stroke="#C2761A" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrowDot)"/>
  <rect x="900" y="572" width="260" height="158" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="918" y="596" font-size="12.5" font-weight="700" fill="#475569">LEGEND</text>
  <line x1="918" y1="616" x2="950" y2="616" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="960" y="620" font-size="12" fill="#475569">request flow</text>
  <line x1="918" y1="640" x2="950" y2="640" stroke="#334155" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="960" y="644" font-size="12" fill="#475569">service-to-service call</text>
  <line x1="918" y1="664" x2="950" y2="664" stroke="#C2761A" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrowDot)"/>
  <text x="960" y="668" font-size="12" fill="#475569">managed-service binding</text>
  <rect x="918" y="684" width="16" height="12" rx="2" fill="#EEF4FF" stroke="#2563EB"/>
  <text x="942" y="694" font-size="12" fill="#475569">Fargate service</text>
  <rect x="918" y="706" width="16" height="12" rx="2" fill="#ECFDF5" stroke="#059669"/>
  <text x="942" y="716" font-size="12" fill="#475569">data store</text>
</svg>
